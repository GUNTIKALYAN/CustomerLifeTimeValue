name: CI - CLTV FastAPI App

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Build Docker Image
      - name: Build Docker image
        run: docker build -t cltv-api:ci .

      # 4. Run Container & Health Check
      - name: Run container
        run: |
          docker run -d -p 8000:8000 --name cltv-test cltv-api:ci
          
          echo "Wait for server to start..."
          sleep 10
          
          # Health check
          curl --fail http://localhost:8000/ || (docker logs cltv-test && exit 1)

      # 5. Stop Container
      - name: Stop container
        if: always()
        run: docker stop cltv-test

      # 6. Login to Docker Hub (main only)
      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 7. Tag & Push Image (main only)
      - name: Push Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/cltv-api

          docker tag cltv-api:ci $IMAGE_NAME:latest
          docker tag cltv-api:ci $IMAGE_NAME:${{ github.sha }}

          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}
      
      - name : Debug logs on failure
        if: failure()
        run: docker logs cltv-test