name: CI - CLTV FastAPI App

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Check model file (IMPORTANT)
      - name: Check model file
        run: |
          if [ ! -f model.pkl ]; then
            echo "Model not found!"
            exit 1
          fi

      # 5. Setup Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 6. Build Docker image
      - name: Build Docker image
        run: docker build -t cltv-api:ci .

      # 7. Run container
      - name: Run container
        run: |
          docker run -d -p 8000:8000 --name cltv-test cltv-api:ci
          sleep 10

      # 8. Test API
      - name: Test API
        run: |
          curl --fail http://localhost:8000/ || exit 1

          curl --fail -X POST http://localhost:8000/predict \
          -H "Content-Type: application/json" \
          -d '{
            "id": 1,
            "gender": "Male",
            "area": "Urban",
            "qualification": "Bachelor",
            "income": "5L-10L",
            "policy": "A",
            "type_of_policy": "Platinum",
            "num_policies": "More than 1",
            "vintage": 5,
            "claim_amount": 5000,
            "marital_status": 1
          }' || exit 1

      # 9. Cleanup
      - name: Cleanup container
        if: always()
        run: |
          docker stop cltv-test || true
          docker rm cltv-test || true

      # 10. Login to Docker Hub
      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 11. Push image
      - name: Tag & Push Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/cltv-api

          docker tag cltv-api:ci $IMAGE_NAME:latest
          docker tag cltv-api:ci $IMAGE_NAME:${{ github.sha }}

          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}